name: Secure API Demo & Validation

on:
  workflow_dispatch:
    inputs:
      demo_mode:
        description: "Run in vendor demo mode"
        required: false
        default: "true"
  push:
    branches: [ "main" ]

jobs:
  api-demo:
    name: API Security & Functionality Demo
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: https://api.yourdomain.com
      NODE_ENV: demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache API demo artifacts
        uses: actions/cache@v4
        with:
          path: .demo-cache
          key: api-demo-${{ github.sha }}
          restore-keys: |
            api-demo-

      - name: Run API demo
        env:
          DEMO_JWT: ${{ secrets.DEMO_JWT }}
          WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
          PLAY_INTEGRITY_TOKEN: ${{ secrets.PLAY_INTEGRITY_TOKEN }}
        run: |
          node .github/scripts/run-demo.js

      - name: Demo summary
        run: |
          echo "✅ API demo completed successfully"
          echo "✅ Auth, integrity, replay protection verified"
          echo "✅ No security violations detected"
